<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #090909;
    --surface: #101010;
    --surface-hover: #151515;
    --border: #1c1c1c;
    --text: #eeebe6;
    --muted: #444;
    --accent: #c9aa7c;
    --accent-dim: rgba(201,170,124,0.07);
    --accent-glow: rgba(201,170,124,0.11);
    --toggle-bg: #131313;
  }
  :root[data-theme="light"] {
    --bg: #f3f0eb;
    --surface: #faf8f5;
    --surface-hover: #ffffff;
    --border: #e0dbd3;
    --text: #1a1917;
    --muted: #aaa49c;
    --accent: #8c5f3c;
    --accent-dim: rgba(140,95,60,0.06);
    --accent-glow: rgba(140,95,60,0.1);
    --toggle-bg: #eae6e0;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background 0.3s, color 0.3s;
  }

  /* HEADER */
  header {
    padding: 1.75rem 3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 10;
    transition: background 0.3s, border-color 0.3s;
  }

  .wordmark {
    display: flex;
    align-items: center;
    gap: 0.55rem;
  }
  .wordmark-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    font-weight: 400;
    letter-spacing: -0.025em;
  }
  .wordmark-pip {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 2px;
  }

  .theme-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--toggle-bg);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.45rem 0.9rem;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    user-select: none;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* MAIN */
  main {
    flex: 1;
    padding: 3.5rem 3rem 5rem;
    max-width: 1080px;
    width: 100%;
    margin: 0 auto;
  }

  .meta {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 3rem;
  }
  .meta-label {
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.45rem;
  }
  .meta-heading {
    font-family: 'DM Serif Display', serif;
    font-size: 2.2rem;
    font-weight: 400;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .meta-count {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    color: var(--muted);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  /* CARD */
  .card {
    aspect-ratio: 1 / 1;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 1.5rem;
    text-decoration: none;
    color: var(--text);
    position: relative;
    overflow: hidden;
    transition: background 0.18s;
    opacity: 0;
    animation: fadeUp 0.35s ease forwards;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-glow);
    opacity: 0;
    transition: opacity 0.18s;
    pointer-events: none;
  }
  .card:hover { background: var(--surface-hover); }
  .card:hover::after { opacity: 1; }

  .card-icon {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    color: var(--accent);
    line-height: 1;
    position: relative;
    z-index: 1;
  }
  .card-arrow {
    position: absolute;
    top: 1.3rem;
    right: 1.3rem;
    color: var(--accent);
    opacity: 0;
    transform: translateX(-5px);
    transition: opacity 0.18s, transform 0.18s;
    z-index: 1;
  }
  .card:hover .card-arrow { opacity: 1; transform: translateX(0); }

  .card-body { position: relative; z-index: 1; }
  .card-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    margin-bottom: 0.25rem;
    transition: color 0.18s;
  }
  .card:hover .card-title { color: var(--accent); }
  .card-sub {
    font-size: 0.6rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    line-height: 1.5;
  }

  /* EMPTY */
  .empty {
    grid-column: 1 / -1;
    aspect-ratio: unset;
    padding: 5rem 2rem;
    text-align: center;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  .empty-glyph {
    font-family: 'DM Serif Display', serif;
    font-size: 3rem;
    color: var(--muted);
    opacity: 0.3;
  }
  .empty-text {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .empty-hint {
    font-size: 0.62rem;
    color: var(--muted);
    opacity: 0.6;
    letter-spacing: 0.05em;
  }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.25rem 3rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: border-color 0.3s;
  }
  .footer-text {
    font-size: 0.58rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="wordmark">
    <span class="wordmark-name">Mathion</span>
    <div class="wordmark-pip"></div>
  </div>
  <button class="theme-btn" id="themeBtn">
    <span id="themeIcon">☀</span>
    <span id="themeLabel">Day</span>
  </button>
</header>

<main>
  <div class="meta">
    <div>
      <div class="meta-label">Index</div>
      <div class="meta-heading">Topics</div>
    </div>
    <span class="meta-count" id="countDisplay"></span>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>
  <span class="footer-text">Mathion</span>
  <span class="footer-text" id="footerCount"></span>
</footer>

<script>
  /* ── Theme ── */
  const html = document.documentElement;
  const themeBtn = document.getElementById('themeBtn');
  const themeIcon = document.getElementById('themeIcon');
  const themeLabel = document.getElementById('themeLabel');

  function applyTheme(t) {
    html.dataset.theme = t;
    themeIcon.textContent = t === 'dark' ? '☀' : '◑';
    themeLabel.textContent = t === 'dark' ? 'Day' : 'Night';
  }
  applyTheme(localStorage.getItem('mathion-theme') || 'dark');
  themeBtn.addEventListener('click', () => {
    const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    localStorage.setItem('mathion-theme', next);
  });

  /* ── Render ── */
  const grid = document.getElementById('grid');
  const countDisplay = document.getElementById('countDisplay');
  const footerCount = document.getElementById('footerCount');

  function renderPages(pages) {
    grid.innerHTML = '';

    if (!Array.isArray(pages) || pages.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-glyph">∅</div>
          <div class="empty-text">No topics yet</div>
          <div class="empty-hint">Add entries to pages.json to create buttons</div>
        </div>`;
      countDisplay.textContent = '';
      footerCount.textContent = '0 topics';
      return;
    }

    const n = pages.length;
    countDisplay.textContent = n + (n === 1 ? ' topic' : ' topics');
    footerCount.textContent = n + (n === 1 ? ' topic' : ' topics');

    pages.forEach((p, i) => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = p.file || '#';
      a.style.animationDelay = (i * 0.055) + 's';
      a.innerHTML = `
        <div class="card-icon">${p.icon || '#'}</div>
        <svg class="card-arrow" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        <div class="card-body">
          <div class="card-title">${p.title || p.file}</div>
          <div class="card-sub">${p.subtitle || ''}</div>
        </div>`;
      grid.appendChild(a);
    });
  }

  /* ── Fetch pages.json (works on GitHub Pages) ── */
  fetch('pages.json')
    .then(r => { if (!r.ok) throw new Error(); return r.json(); })
    .then(renderPages)
    .catch(() => {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-glyph">!</div>
          <div class="empty-text">pages.json not found</div>
          <div class="empty-hint">Make sure pages.json is in the same folder as index.html</div>
        </div>`;
    });
</script>
</body>
</html>
