<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathion — Simulation Lab</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f2f1ee;
    --surface:   #faf9f7;
    --panel:     #eceae6;
    --border:    #d8d5cf;
    --border2:   #c4c0b8;
    --accent:    #1a1916;
    --accent2:   #3d3a34;
    --muted:     #9e9a92;
    --muted2:    #7a766e;
    --white:     #ffffff;
    --text:      #2e2c28;
    --text2:     #5a5750;
    --green:     #3a9e6e;
    --nav-h:     52px;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ══ NAVBAR ══════════════════════════════════════════ */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: rgba(250,249,247,0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    z-index: 100;
    padding: 0 28px;
    gap: 16px;
  }

  .nav-logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: -0.01em;
    display: flex;
    align-items: center;
    gap: 7px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .nav-logo .dot {
    width: 6px; height: 6px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(58,158,110,0.5);
    animation: blink 2.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  .nav-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; }

  .nav-tagline {
    font-size: 0.62rem;
    color: var(--muted2);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-family: 'IBM Plex Mono', monospace;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* Search in navbar */
  .nav-search {
    flex: 1;
    position: relative;
    max-width: 340px;
    margin-left: auto;
  }
  .nav-search-icon {
    position: absolute;
    left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
    line-height: 1;
  }
  #search {
    width: 100%;
    padding: 7px 30px 7px 30px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--accent);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus {
    background: var(--white);
    border-color: var(--border2);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }
  .search-clear {
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); font-size: 0.8rem;
    cursor: pointer; padding: 3px; line-height: 1;
    display: none; transition: color 0.15s;
  }
  .search-clear:hover { color: var(--accent); }
  .search-clear.visible { display: block; }

  .nav-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted2);
    letter-spacing: 0.06em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .nav-count strong { color: var(--accent); }

  /* ══ SUBHEADER ════════════════════════════════════════ */
  .subheader {
    margin-top: var(--nav-h);
    padding: 22px 28px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }
  .subheader-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .subheader-desc {
    font-size: 0.8rem;
    color: var(--muted2);
    margin-top: 5px;
    font-weight: 300;
  }

  /* ══ MAIN LAYOUT ══════════════════════════════════════ */
  .layout {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ══ SIDEBAR ══════════════════════════════════════════ */
  .sidebar {
    width: 200px;
    min-width: 200px;
    padding: 24px 0;
    border-right: 1px solid var(--border);
    position: sticky;
    top: var(--nav-h);
    height: calc(100vh - var(--nav-h));
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .sidebar-section { padding: 0 14px; margin-bottom: 20px; }

  .sidebar-heading {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.56rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--border);
  }

  .cat-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    background: none; border: none;
    padding: 6px 8px;
    border-radius: 3px;
    color: var(--muted2);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    text-align: left;
    margin-bottom: 1px;
  }
  .cat-btn:hover { background: var(--panel); color: var(--text); }
  .cat-btn.active { background: var(--accent); color: var(--white); font-weight: 500; }
  .cat-btn .cat-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 8px;
    color: var(--muted2);
  }
  .cat-btn.active .cat-count { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.3); color: var(--white); }

  /* ══ CONTENT ══════════════════════════════════════════ */
  .content {
    flex: 1;
    padding: 22px 0 40px 24px;
    min-width: 0;
  }

  .content-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .results-info {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted2);
    letter-spacing: 0.04em;
  }
  .results-info strong { color: var(--accent); }

  .sort-row { display: flex; gap: 4px; }
  .sort-btn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 5px 10px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted2);
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.15s;
  }
  .sort-btn:hover { border-color: var(--border2); color: var(--text); background: var(--panel); }
  .sort-btn.active { border-color: var(--accent); color: var(--white); background: var(--accent); }

  /* ══ GRID ═════════════════════════════════════════════ */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.35s ease both;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.1);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-img {
    width: 100%;
    aspect-ratio: 16/9;
    background: var(--panel);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.3s ease;
  }
  .card:hover .card-img img { transform: scale(1.05); }

  .card-img-placeholder {
    width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--panel) 0%, var(--border) 100%);
    color: var(--muted2);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    position: relative;
    overflow: hidden;
  }
  .card-img-placeholder::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
    background-size: 20px 20px;
  }
  .card-img-placeholder span { position: relative; z-index: 1; }

  .card-overlay {
    position: absolute; inset: 0;
    background: rgba(26,25,22,0.45);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.2s;
  }
  .card:hover .card-overlay { opacity: 1; }
  .play-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--white);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; color: var(--accent);
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    transform: scale(0.75); transition: transform 0.2s;
  }
  .card:hover .play-btn { transform: scale(1); }

  .card-badge {
    position: absolute;
    top: 8px; left: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.54rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 2px 7px;
    background: rgba(250,249,247,0.92);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text2);
    backdrop-filter: blur(4px);
  }

  .card-body {
    padding: 14px 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
  }
  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--accent);
    line-height: 1.3;
    transition: color 0.2s;
  }
  .card:hover .card-title { color: var(--text); }

  .card-desc {
    font-size: 0.74rem;
    color: var(--muted2);
    line-height: 1.6;
    flex: 1;
  }

  .card-footer {
    display: flex;
    align-items: center;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .card-link {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted2);
    display: flex;
    align-items: center;
    gap: 4px;
    transition: gap 0.2s, color 0.2s;
  }
  .card:hover .card-link { gap: 8px; color: var(--accent); }

  /* ══ EMPTY ════════════════════════════════════════════ */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
  }
  .empty-icon { font-size: 2rem; margin-bottom: 12px; opacity: 0.2; }
  .empty-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.88rem; color: var(--muted2); margin-bottom: 6px; }
  .empty-sub { font-size: 0.74rem; color: var(--muted); }

  /* ══ FOOTER ═══════════════════════════════════════════ */
  footer {
    border-top: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    background: var(--white);
  }
  .footer-brand {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent);
  }
  .footer-text { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.04em; }

  /* ══ RESPONSIVE ═══════════════════════════════════════ */
  @media (max-width: 800px) {
    .sidebar { display: none; }
    .content { padding: 18px 0 24px; }
    .layout { padding: 0 14px; }
    nav { padding: 0 16px; gap: 10px; }
    .nav-tagline, .nav-divider { display: none; }
    .nav-search { max-width: none; }
    .subheader { padding: 16px; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<!-- ══ NAVBAR ══════════════════════════════════════════ -->
<nav>
  <a href="#" class="nav-logo">
    Mathion
    <div class="dot"></div>
  </a>
  <div class="nav-divider"></div>
  <span class="nav-tagline">Simulation Lab</span>

  <div class="nav-search">
    <span class="nav-search-icon">⌕</span>
    <input type="text" id="search" placeholder="Search simulations…" autocomplete="off" spellcheck="false">
    <button class="search-clear" id="search-clear" title="Clear">✕</button>
  </div>

  <div class="nav-count"><strong id="nav-count">0</strong> simulations</div>
</nav>

<!-- ══ SUBHEADER ═══════════════════════════════════════ -->
<div class="subheader">
  <div class="subheader-title">Mathion</div>
  <div class="subheader-desc">Interactive physics &amp; mathematics simulation laboratory</div>
</div>

<!-- ══ MAIN ═════════════════════════════════════════════ -->
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-heading">Categories</div>
      <button class="cat-btn active" data-cat="all" onclick="filterCat('all')">
        All <span class="cat-count" id="cnt-all">0</span>
      </button>
      <div id="cat-list"></div>
    </div>
  </aside>

  <main class="content">
    <div class="content-bar">
      <div class="results-info" id="results-info">Loading…</div>
      <div class="sort-row">
        <button class="sort-btn active" onclick="setSort('default', this)">Default</button>
        <button class="sort-btn" onclick="setSort('az', this)">A – Z</button>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </main>

</div>

<!-- ══ FOOTER ══════════════════════════════════════════ -->
<footer>
  <div class="footer-brand">Mathion</div>
  <div class="footer-text">Simulations loaded from pages.json</div>
</footer>

<script>
let allSims = [], filtered = [], activecat = 'all', sortMode = 'default', query = '';

fetch('pages.json')
  .then(r => { if (!r.ok) throw new Error(); return r.json(); })
  .then(data => { allSims = data; buildCats(); applyFilters(); })
  .catch(() => {
    document.getElementById('grid').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠</div>
        <div class="empty-title">pages.json not found</div>
        <div class="empty-sub">Place pages.json in the same folder as index.html</div>
      </div>`;
    document.getElementById('results-info').textContent = 'Error loading simulations';
  });

function buildCats() {
  const counts = {};
  allSims.forEach(s => { const c = s.category || 'Uncategorised'; counts[c] = (counts[c]||0)+1; });
  document.getElementById('cnt-all').textContent = allSims.length;
  document.getElementById('nav-count').textContent = allSims.length;
  const list = document.getElementById('cat-list');
  list.innerHTML = '';
  Object.entries(counts).sort().forEach(([cat, cnt]) => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = cat;
    btn.innerHTML = `${cat} <span class="cat-count">${cnt}</span>`;
    btn.onclick = () => filterCat(cat);
    list.appendChild(btn);
  });
}

function filterCat(cat) {
  activecat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  applyFilters();
}

function setSort(mode, btn) {
  sortMode = mode;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

const searchEl = document.getElementById('search');
const clearBtn = document.getElementById('search-clear');
searchEl.addEventListener('input', () => {
  query = searchEl.value.trim().toLowerCase();
  clearBtn.classList.toggle('visible', query.length > 0);
  applyFilters();
});
clearBtn.addEventListener('click', () => {
  searchEl.value = ''; query = '';
  clearBtn.classList.remove('visible');
  applyFilters(); searchEl.focus();
});

function applyFilters() {
  filtered = allSims.filter(s => {
    const matchCat = activecat === 'all' || (s.category||'Uncategorised') === activecat;
    const matchQ   = !query || s.title.toLowerCase().includes(query)
                            || (s.description||'').toLowerCase().includes(query)
                            || (s.category||'').toLowerCase().includes(query);
    return matchCat && matchQ;
  });
  if (sortMode === 'az') filtered = [...filtered].sort((a,b) => a.title.localeCompare(b.title));
  renderGrid();
  document.getElementById('results-info').innerHTML =
    `<strong>${filtered.length}</strong> of ${allSims.length} simulation${allSims.length !== 1 ? 's' : ''}` +
    (query ? ` matching "<strong>${searchEl.value}</strong>"` : '');
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (filtered.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔭</div>
        <div class="empty-title">No simulations found</div>
        <div class="empty-sub">Try a different search term or category</div>
      </div>`;
    return;
  }
  filtered.forEach((sim, i) => {
    const a = document.createElement('a');
    a.href = sim.file;
    a.className = 'card';
    a.style.animationDelay = (i * 0.05) + 's';
    const label = sim.title.slice(0,2).toUpperCase();
    const imgHTML = sim.image
      ? `<img src="${sim.image}" alt="${sim.title}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder><span>${label}</span></div>'">`
      : `<div class="card-img-placeholder"><span>${label}</span></div>`;
    a.innerHTML = `
      <div class="card-img">
        ${imgHTML}
        <div class="card-overlay"><div class="play-btn">▶</div></div>
        ${sim.category ? `<div class="card-badge">${sim.category}</div>` : ''}
      </div>
      <div class="card-body">
        <div class="card-title">${hl(sim.title)}</div>
        <div class="card-desc">${hl(sim.description||'')}</div>
        <div class="card-footer">
          <span class="card-link">Open simulation →</span>
        </div>
      </div>`;
    grid.appendChild(a);
  });
}

function hl(text) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
  return text.replace(re, '<mark style="background:rgba(0,0,0,0.08);color:var(--accent);border-radius:2px;padding:0 2px">$1</mark>');
}
</script>
</body>
</html>
