<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Simulations</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg2: #f5f5f4;
      --border: #e2e2e0;
      --text: #1a1a18;
      --muted: #6b6b67;
      --accent: #4f46e5;
      --accent-bg: #eef2ff;
      --tag-bg: #f0f0ef;
      --tag-text: #4b4b47;
      --radius: 12px;
      --shadow-hover: 0 6px 24px rgba(0,0,0,0.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --bg2: #242422;
        --border: #333330;
        --text: #e8e8e4;
        --muted: #9a9a94;
        --accent: #818cf8;
        --accent-bg: #1e1b4b;
        --tag-bg: #2a2a28;
        --tag-text: #b0b0aa;
        --shadow-hover: 0 6px 24px rgba(0,0,0,0.3);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 24px 80px;
    }

    header {
      max-width: 860px;
      margin: 0 auto 40px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    header p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .controls {
      max-width: 860px;
      margin: 0 auto 28px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    #search {
      flex: 1;
      min-width: 200px;
      padding: 9px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg2);
      color: var(--text);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--muted); }

    .tag-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag-btn {
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--tag-bg);
      color: var(--tag-text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .tag-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tag-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); }

    .grid {
      max-width: 860px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.18s, transform 0.18s, border-color 0.18s;
      cursor: pointer;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
      border-color: var(--accent);
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
      flex: 1;
      margin-bottom: 14px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      font-size: 0.75rem;
      padding: 3px 9px;
      background: var(--tag-bg);
      color: var(--tag-text);
      border-radius: 20px;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 0.95rem;
    }

    footer {
      max-width: 860px;
      margin: 48px auto 0;
      font-size: 0.8rem;
      color: var(--muted);
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>Math Simulations</h1>
    <p>A collection of interactive tools for exploring mathematical concepts.</p>
  </header>

  <div class="controls">
    <input type="text" id="search" placeholder="Search simulations…" oninput="render()" />
    <div class="tag-filters" id="tag-filters"></div>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    <p>To add a simulation, edit <a href="simulations.json" target="_blank">simulations.json</a>.</p>
  </footer>

  <script>
    let sims = [];
    let activeTag = null;

    fetch('simulations.json')
      .then(r => r.json())
      .then(data => {
        sims = data;
        buildTagFilters();
        render();
      })
      .catch(() => {
        document.getElementById('grid').innerHTML =
          '<p class="empty">Could not load simulations.json. Make sure it is in the same folder.</p>';
      });

    function buildTagFilters() {
      const allTags = [...new Set(sims.flatMap(s => s.tags || []))].sort();
      const container = document.getElementById('tag-filters');
      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn';
        btn.textContent = tag;
        btn.onclick = () => {
          activeTag = activeTag === tag ? null : tag;
          document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
          if (activeTag) btn.classList.add('active');
          render();
        };
        container.appendChild(btn);
      });
    }

    function render() {
      const query = document.getElementById('search').value.toLowerCase();
      const grid = document.getElementById('grid');

      let filtered = sims.filter(s => {
        const matchesSearch = !query ||
          s.title.toLowerCase().includes(query) ||
          (s.description || '').toLowerCase().includes(query) ||
          (s.tags || []).some(t => t.toLowerCase().includes(query));
        const matchesTag = !activeTag || (s.tags || []).includes(activeTag);
        return matchesSearch && matchesTag;
      });

      if (filtered.length === 0) {
        grid.innerHTML = '<p class="empty">No simulations match your search.</p>';
        return;
      }

      grid.innerHTML = filtered.map(s => `
        <a class="card" href="${s.url}" target="_blank" rel="noopener">
          <div class="card-title">${s.title}</div>
          <div class="card-desc">${s.description || ''}</div>
          ${s.tags && s.tags.length ? `
            <div class="card-tags">
              ${s.tags.map(t => `<span class="tag">${t}</span>`).join('')}
            </div>` : ''}
        </a>
      `).join('');
    }
  </script>

</body>
</html>
