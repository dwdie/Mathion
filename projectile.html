<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projectile Motion Simulation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --surface: #111418;
    --border: #1e2530;
    --text: #ffffff;
    --muted: #5a6a80;
    --accent: #3b82f6;
    --accent2: #60a5fa;
    --accent3: #38bdf8;
    --trail: rgba(59, 130, 246, 0.18);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }

  header {
    width: 100%;
    max-width: 900px;
    margin-bottom: 28px;
    border-bottom: 1.5px solid var(--border);
    padding-bottom: 16px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 2rem;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .main-layout {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 20px;
    align-items: start;
  }

  /* --- Controls --- */
  .controls {
    background: var(--surface);
    border: 1.5px solid var(--border);
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .ctrl-group label {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 3px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    transition: transform 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  .val {
    font-size: 0.78rem;
    color: var(--accent);
    min-width: 38px;
    text-align: right;
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  button {
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text);
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  button.primary:hover { background: #2563eb; border-color: #2563eb; }

  /* --- Stats --- */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-box {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 8px 10px;
  }

  .stat-box .s-label {
    font-size: 0.6rem;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .stat-box .s-val {
    font-size: 0.82rem;
    color: var(--accent2);
  }

  /* --- Canvas area --- */
  .canvas-wrap {
    border: 1.5px solid var(--border);
    position: relative;
    background: #0d1117;
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100%;
    height: auto;
  }

  .axis-label {
    position: absolute;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .axis-label.x-ax { bottom: 30px; right: 14px; }
  .axis-label.y-ax { top: 14px; left: 14px; }

  /* --- Info chips --- */
  .info-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .chip {
    font-size: 0.64rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .chip span { color: var(--text); }

  .legend {
    display: flex;
    gap: 14px;
    margin-top: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .leg-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.63rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .leg-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .leg-line {
    width: 18px;
    height: 2px;
  }

  @media (max-width: 680px) {
    .main-layout { grid-template-columns: 1fr; }
    h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<div class="main-layout">

  <!-- Controls -->
  <aside class="controls">

    <div class="ctrl-group">
      <label>Initial Speed (m/s)</label>
      <div class="ctrl-row">
        <input type="range" id="speed" min="5" max="100" value="50" step="1">
        <span class="val" id="speedVal">50</span>
      </div>
    </div>

    <div class="ctrl-group">
      <label>Launch Angle (°)</label>
      <div class="ctrl-row">
        <input type="range" id="angle" min="1" max="89" value="45" step="1">
        <span class="val" id="angleVal">45</span>
      </div>
    </div>

    <div class="ctrl-group">
      <label>Gravity (m/s²)</label>
      <div class="ctrl-row">
        <input type="range" id="gravity" min="1" max="25" value="9.8" step="0.1">
        <span class="val" id="gravVal">9.8</span>
      </div>
    </div>

    <div class="ctrl-group">
      <label>Air Resistance</label>
      <div class="ctrl-row">
        <input type="range" id="drag" min="0" max="0.05" value="0" step="0.001">
        <span class="val" id="dragVal">0.000</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="stats">
      <div class="stat-box"><div class="s-label">Max Height</div><div class="s-val" id="sHeight">—</div></div>
      <div class="stat-box"><div class="s-label">Range</div><div class="s-val" id="sRange">—</div></div>
      <div class="stat-box"><div class="s-label">Flight Time</div><div class="s-val" id="sTime">—</div></div>
      <div class="stat-box"><div class="s-label">Vx / Vy</div><div class="s-val" id="sVel">—</div></div>
    </div>

    <div class="divider"></div>

    <div class="buttons">
      <button class="primary" id="launchBtn">▶ Launch</button>
      <button id="resetBtn">↺ Reset</button>
      <button id="trailBtn">◎ Toggle Trail</button>
    </div>

  </aside>

  <!-- Canvas -->
  <div>
    <div class="canvas-wrap">
      <canvas id="sim" width="640" height="400"></canvas>
      <span class="axis-label x-ax">x (m) →</span>
      <span class="axis-label y-ax">↑ y (m)</span>
    </div>

    <div class="info-row">
      <div class="chip">Equations of Motion: <span>x = v₀cosθ·t &nbsp;|&nbsp; y = v₀sinθ·t − ½gt²</span></div>
    </div>

    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:#3b82f6"></div> Projectile</div>
      <div class="leg-item"><div class="leg-line" style="background:rgba(59,130,246,0.4)"></div> Trail</div>
      <div class="leg-item"><div class="leg-dot" style="background:#93c5fd"></div> Velocity Vector</div>
      <div class="leg-item"><div class="leg-dot" style="background:#3b82f6; border-radius:0; width:12px; height:3px"></div> Ground</div>
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById('sim');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Params
let speed = 50, angle = 45, gravity = 9.8, drag = 0;
let showTrail = true;

// Sim state
let animId = null;
let running = false;
let t = 0, dt = 1/60;
let px = 0, py = 0, vx = 0, vy = 0;
let trail = [];
let maxH = 0, finalRange = 0, finalTime = 0;

// Scale: world → canvas
const PAD = { l: 50, r: 20, t: 30, b: 50 };
let scaleX = 1, scaleY = 1, worldW = 1, worldH = 1;

function computeWorldDims() {
  const angleR = angle * Math.PI / 180;
  const v0x = speed * Math.cos(angleR);
  const v0y = speed * Math.sin(angleR);
  // analytic (no drag) for scale reference
  const Tfly = 2 * v0y / gravity;
  const maxRange = v0x * Tfly * 1.1;
  const maxHeight = (v0y * v0y) / (2 * gravity) * 1.25;
  worldW = Math.max(maxRange, 1);
  worldH = Math.max(maxHeight, 1);
  scaleX = (W - PAD.l - PAD.r) / worldW;
  scaleY = (H - PAD.t - PAD.b) / worldH;
}

function toCanvas(wx, wy) {
  return [
    PAD.l + wx * scaleX,
    H - PAD.b - wy * scaleY
  ];
}

function drawGrid() {
  ctx.save();
  ctx.strokeStyle = '#1a2535';
  ctx.lineWidth = 1;
  ctx.setLineDash([]);

  // vertical grid lines
  const xStep = niceStep(worldW, 5);
  for (let x = 0; x <= worldW + xStep; x += xStep) {
    const [cx] = toCanvas(x, 0);
    if (cx > W - PAD.r + 1) break;
    ctx.beginPath();
    ctx.moveTo(cx, PAD.t);
    ctx.lineTo(cx, H - PAD.b);
    ctx.stroke();
    ctx.fillStyle = '#3a4a60';
    ctx.font = '10px DM Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(x.toFixed(0), cx, H - PAD.b + 16);
  }

  // horizontal grid lines
  const yStep = niceStep(worldH, 4);
  for (let y = 0; y <= worldH + yStep; y += yStep) {
    const [, cy] = toCanvas(0, y);
    if (cy < PAD.t - 1) break;
    ctx.beginPath();
    ctx.moveTo(PAD.l, cy);
    ctx.lineTo(W - PAD.r, cy);
    ctx.stroke();
    ctx.fillStyle = '#3a4a60';
    ctx.font = '10px DM Mono, monospace';
    ctx.textAlign = 'right';
    ctx.fillText(y.toFixed(0), PAD.l - 6, cy + 4);
  }

  ctx.restore();
}

function niceStep(range, targetCount) {
  const raw = range / targetCount;
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const nice = [1, 2, 5, 10].map(n => n * mag).find(n => n >= raw) || mag * 10;
  return nice;
}

function drawAxes() {
  ctx.save();
  ctx.strokeStyle = '#2a3a50';
  ctx.lineWidth = 1.5;

  // x axis
  ctx.beginPath();
  ctx.moveTo(PAD.l, H - PAD.b);
  ctx.lineTo(W - PAD.r, H - PAD.b);
  ctx.stroke();

  // y axis
  ctx.beginPath();
  ctx.moveTo(PAD.l, PAD.t);
  ctx.lineTo(PAD.l, H - PAD.b);
  ctx.stroke();

  // ground
  ctx.strokeStyle = '#3b82f6';
  ctx.lineWidth = 2.5;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  ctx.moveTo(PAD.l, H - PAD.b);
  ctx.lineTo(W - PAD.r, H - PAD.b);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

function drawTrail() {
  if (!showTrail || trail.length < 2) return;
  ctx.save();
  for (let i = 1; i < trail.length; i++) {
    const [x1, y1] = toCanvas(trail[i-1].x, trail[i-1].y);
    const [x2, y2] = toCanvas(trail[i].x, trail[i].y);
    const alpha = (i / trail.length) * 0.5;
    ctx.beginPath();
    ctx.strokeStyle = `rgba(59,130,246,${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBall(wx, wy) {
  const [cx, cy] = toCanvas(wx, wy);
  // shadow
  ctx.save();
  ctx.shadowColor = 'rgba(59,130,246,0.4)';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.arc(cx, cy, 7, 0, Math.PI * 2);
  ctx.fillStyle = '#3b82f6';
  ctx.fill();
  ctx.restore();

  // highlight
  ctx.beginPath();
  ctx.arc(cx - 2, cy - 2, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fill();
}

function drawVelocityVector(wx, wy, vvx, vvy) {
  const [cx, cy] = toCanvas(wx, wy);
  const scale = 1.8;
  const ex = cx + vvx * scale;
  const ey = cy - vvy * scale;

  ctx.save();
  ctx.strokeStyle = '#93c5fd';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(ex, ey);
  ctx.stroke();

  // arrow head
  const dx = ex - cx, dy = ey - cy;
  const len = Math.sqrt(dx*dx + dy*dy);
  if (len > 5) {
    const ux = dx/len, uy = dy/len;
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - ux*8 + uy*4, ey - uy*8 - ux*4);
    ctx.lineTo(ex - ux*8 - uy*4, ey - uy*8 + ux*4);
    ctx.closePath();
    ctx.fillStyle = '#93c5fd';
    ctx.fill();
  }

  // Vx component
  ctx.strokeStyle = '#38bdf8';
  ctx.lineWidth = 1;
  ctx.setLineDash([3,3]);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(ex, cy);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(ex, cy);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.restore();
}

function drawLaunchAngle() {
  const [ox, oy] = toCanvas(0, 0);
  const r = 36;
  const rad = angle * Math.PI / 180;
  ctx.save();
  ctx.strokeStyle = '#1e3a5f';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(ox, oy, r, -Math.PI/2 - rad, -Math.PI/2, false);
  ctx.stroke();
  // label
  ctx.fillStyle = '#4a6a90';
  ctx.font = '10px DM Mono, monospace';
  ctx.fillText(`${angle}°`, ox + r * Math.cos(-Math.PI/2 + rad/2) * 0.6 + 4, oy + r * Math.sin(-Math.PI/2 + rad/2) * 0.6);
  ctx.restore();
}

function drawFrame() {
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);
  drawGrid();
  drawAxes();
  drawTrail();
  drawLaunchAngle();
  drawBall(px, py);
  drawVelocityVector(px, py, vx, vy);
  updateStats();
}

function updateStats() {
  document.getElementById('sHeight').textContent = maxH.toFixed(1) + ' m';
  document.getElementById('sRange').textContent = (running || trail.length > 0 ? px.toFixed(1) : '—') + (running ? '' : ' m');
  document.getElementById('sTime').textContent = t.toFixed(2) + ' s';
  document.getElementById('sVel').textContent = `${vx.toFixed(1)} / ${vy.toFixed(1)}`;
}

function step() {
  if (!running) return;

  // RK4 style simple euler with drag
  const speed_mag = Math.sqrt(vx*vx + vy*vy);
  const ax = -drag * speed_mag * vx;
  const ay = -gravity - drag * speed_mag * vy;

  vx += ax * dt;
  vy += ay * dt;
  px += vx * dt;
  py += vy * dt;
  t += dt;

  if (py > maxH) maxH = py;

  trail.push({ x: px, y: py });

  if (py <= 0 && t > 0.05) {
    py = 0;
    running = false;
    finalRange = px;
    finalTime = t;
    document.getElementById('sRange').textContent = finalRange.toFixed(1) + ' m';
    document.getElementById('sTime').textContent = finalTime.toFixed(2) + ' s';
    drawFrame();
    return;
  }

  drawFrame();
  animId = requestAnimationFrame(step);
}

function launch() {
  if (animId) cancelAnimationFrame(animId);
  computeWorldDims();
  trail = [];
  t = 0; maxH = 0; finalRange = 0; finalTime = 0;

  const rad = angle * Math.PI / 180;
  px = 0; py = 0;
  vx = speed * Math.cos(rad);
  vy = speed * Math.sin(rad);
  running = true;

  animId = requestAnimationFrame(step);
}

function reset() {
  if (animId) cancelAnimationFrame(animId);
  running = false;
  trail = [];
  t = 0; maxH = 0;
  const rad = angle * Math.PI / 180;
  px = 0; py = 0;
  vx = speed * Math.cos(rad);
  vy = speed * Math.sin(rad);
  computeWorldDims();
  drawFrame();
  document.getElementById('sHeight').textContent = '—';
  document.getElementById('sRange').textContent = '—';
  document.getElementById('sTime').textContent = '0.00 s';
  document.getElementById('sVel').textContent = `${vx.toFixed(1)} / ${vy.toFixed(1)}`;
}

// Slider bindings
function bindSlider(id, valId, prop, fmt) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => {
    window[prop] = parseFloat(el.value);
    document.getElementById(valId).textContent = fmt ? el.value : parseFloat(el.value).toFixed(typeof fmt === 'number' ? fmt : 0);
    if (!running) reset();
  });
}

document.getElementById('speed').addEventListener('input', function() {
  speed = parseFloat(this.value);
  document.getElementById('speedVal').textContent = speed;
  if (!running) reset();
});
document.getElementById('angle').addEventListener('input', function() {
  angle = parseFloat(this.value);
  document.getElementById('angleVal').textContent = angle;
  if (!running) reset();
});
document.getElementById('gravity').addEventListener('input', function() {
  gravity = parseFloat(this.value);
  document.getElementById('gravVal').textContent = gravity;
  if (!running) reset();
});
document.getElementById('drag').addEventListener('input', function() {
  drag = parseFloat(this.value);
  document.getElementById('dragVal').textContent = drag.toFixed(3);
  if (!running) reset();
});

document.getElementById('launchBtn').addEventListener('click', launch);
document.getElementById('resetBtn').addEventListener('click', reset);
document.getElementById('trailBtn').addEventListener('click', () => {
  showTrail = !showTrail;
  if (!running) drawFrame();
});

// Init
computeWorldDims();
const rad = angle * Math.PI / 180;
px = 0; py = 0;
vx = speed * Math.cos(rad);
vy = speed * Math.sin(rad);
drawFrame();
</script>
</body>
</html>
